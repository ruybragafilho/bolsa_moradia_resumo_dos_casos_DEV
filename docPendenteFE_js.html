<script>

  "use strict";
  
  /**
   * Função frontend que altera o status da documentação de um caso
   *  
   * @param {String} id: id do caso cujo status da documentação será alterado
   *
   */  
  function docPendenteFE( idCaso ) {
    
    // Se id não é uma string válida, lança uma exceção
    if( !isStringValidFE(idCaso) ) {
      throw( new Error( "docPendenteFE - ID Inválido (teste String): " + idCaso ) );
    }      

    // Converte o id para Integer
    const id = parseInt(idCaso);

    // Se id não é um inteiro válido, lança uma exceção
    if( !isIntegerValidFE(id) ) {
      throw( new Error( "docPendenteFE - ID Inválido (teste Integer): " + idCaso ) );
    }  
  
    // Se id está fora dos limites inferior ou superior, lança uma exceção
    if( id < 1  ||  id > numCasos ) {
      throw( new Error( "docPendenteFE - ID Inválido (Teste Limite): " + idCaso ) );
    }  
     

    // Chama função do Apps Script para designar um caso
    google.script.run
                 .withSuccessHandler( () => {

                   // Volta para a tela de resumos de casos
                   console.log( "\ndocPendenteFE_js - INÍCIO" ); 
                   redirecionarParaTelaResumosDosCasos( 1 );
                   console.log( "docPendenteFE_js - FIM" ); 

                 })
                 .withFailureHandler( erro => {

                   // mostra modal com mensagem de erro
                   mostrarModalErro( "docPendenteFE - Failure Handler: " + erro.message );

                 })
                 // Chama a função backend que altera o status da documentação
                 .docPendenteBE( id );  

  } // Fim da função docPendenteFE


</script>
